<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Video Behavior Scoring — Open Field (OFT)</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>
  <div class="app">
    <h1>OFT Scoring Tool</h1>

    <section class="controls">
      <label>Video file: <input id="videoFile" type="file" accept="video/*" /></label>
      <label>Scorer: <input id="scorer" type="text" placeholder="RA_Jane" /></label>
      <label>Subject ID: <input id="subjectId" type="text" placeholder="Rat12" /></label>
      <label>Date: <input id="date" type="date" /></label>
      <label>Time: <input id="time" type="time" /></label>
      <div class="start-state">
        <label>Starting state:
          <select id="startState">
            <option value="EDGE">EDGE</option>
            <option value="CENTER">CENTER</option>
          </select>
        </label>
        <button id="setStartState">Set Start</button>
      </div>
    </section>

    <section class="player">
      <video id="videoPlayer" controls></video>
      <div class="player-buttons">
        <button id="addState">Add State Transition</button>
        <button id="startEvent">Start Event</button>
        <select id="eventType">
          <option>GROOMING</option>
          <option>REARING</option>
        </select>
        <button id="stopEvent">Stop Event</button>
      </div>
    </section>

    <section class="timelines">
      <h2>State Timeline</h2>
      <ul id="stateList"></ul>

      <h2>Event Timeline</h2>
      <ul id="eventList"></ul>
    </section>

    <section class="exports">
      <button id="exportJson">Export JSON</button>
      <button id="exportCsv">Export CSV</button>
      <button id="clearAll">Clear All</button>
    </section>
  </div>

  <script src="src/js/app.js"></script>
</body>
</html>
