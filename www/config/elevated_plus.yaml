# Elevated plus maze configuration for scoring
task: elevated_plus
default_start: CENTER
states:
  - name: CLOSED
    key: a
  - name: CENTER
    key: s
  - name: OPEN
    key: d
events:
  - name: GROOMING
    key: g
  - name: REARING
    key: r
  - name: STRETCH-ATTEND
    key: t
colors:
  CLOSED: '#ffeeaa'
  CENTER: '#cccccc'
  OPEN: '#dddddd'
duration: 300
